name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --all-targets

  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}

      - name: Cross build binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hintbot dist/
          tar -czf hintbot-${{ matrix.target }}.tar.gz -C dist hintbot
          rm -f dist/hintbot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: hintbot-${{ matrix.target }}.tar.gz

  package-deb-rpm:
    name: Package DEB/RPM (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: build-linux
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            nfpm_arch: amd64
          - target: aarch64-unknown-linux-gnu
            nfpm_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download target artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: dist

      - name: Prepare staging files
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=0.0.0" >> "$GITHUB_ENV"
          fi

          mkdir -p staging/usr/bin staging/etc/default staging/usr/lib/systemd/system

          tar -xzf "dist/hintbot-${{ matrix.target }}.tar.gz" -C dist
          cp dist/hintbot staging/usr/bin/hintbot
          cp packaging/examples/hintbot.env staging/etc/default/hintbot
          cp packaging/systemd/hintbot.service staging/usr/lib/systemd/system/hintbot.service
          cp packaging/systemd/hintbot.timer staging/usr/lib/systemd/system/hintbot.timer

      - name: Create deb package
        id: nfpm-deb
        uses: burningalchemist/action-gh-nfpm@v1
        with:
          packager: deb
          config: packaging/nfpm.yaml
        env:
          VERSION: ${{ env.VERSION }}
          NFPM_ARCH: ${{ matrix.nfpm_arch }}

      - name: Create rpm package
        id: nfpm-rpm
        uses: burningalchemist/action-gh-nfpm@v1
        with:
          packager: rpm
          config: packaging/nfpm.yaml
        env:
          VERSION: ${{ env.VERSION }}
          NFPM_ARCH: ${{ matrix.nfpm_arch }}

      - name: Upload DEB/RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.target }}
          path: |
            ${{ steps.nfpm-deb.outputs.package }}
            ${{ steps.nfpm-rpm.outputs.package }}

  package-arch:
    name: Package Arch (x86_64)
    runs-on: ubuntu-latest
    needs: build-linux
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64-unknown-linux-gnu
          path: dist

      - name: Prepare Arch package sources
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0"
          fi
          VERSION="${VERSION//-/_}"

          mkdir -p archpkg
          tar -xzf dist/hintbot-x86_64-unknown-linux-gnu.tar.gz -C dist

          cp dist/hintbot archpkg/hintbot
          cp packaging/examples/hintbot.env archpkg/hintbot.env
          cp packaging/systemd/hintbot.service archpkg/hintbot.service
          cp packaging/systemd/hintbot.timer archpkg/hintbot.timer
          sed -e "s/@VERSION@/${VERSION}/g" -e "s|@REPO@|${GITHUB_REPOSITORY}|g" packaging/arch/PKGBUILD > archpkg/PKGBUILD

      - name: Build Arch package with makepkg
        run: |
          docker run --rm -v "$PWD/archpkg:/work" -w /work archlinux:latest bash -lc '
            pacman -Syu --noconfirm --needed base-devel fakeroot
            useradd -m builder
            chown -R builder:builder /work
            su builder -c "makepkg --syncdeps --noconfirm --cleanbuild --clean"
          '

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-arch-x86_64
          path: archpkg/*.pkg.tar.zst

  release:
    name: GitHub Release
    needs:
      - build-linux
      - package-deb-rpm
      - package-arch
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
